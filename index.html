<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Work Companion">
  <meta name="theme-color" content="#0a0a0f">
  <title>Work Companion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <!-- Status Bar Spacer for iOS -->
    <div class="status-bar-spacer"></div>

    <!-- Header -->
    <header id="app-header">
      <div class="header-content">
        <div class="header-left">
          <span class="header-logo">⬡</span>
          <span class="header-title">Work Companion</span>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="notif-btn" aria-label="Notifications">
            <span class="icon">🔔</span>
            <span class="badge" id="notif-badge" hidden>0</span>
          </button>
          <button class="icon-btn" id="week-btn" aria-label="Current week">
            <span id="week-label">W26</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content">
      <!-- Views injected here by router -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-view="home">
        <span class="nav-icon">⊡</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-view="metrics">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Metrics</span>
      </button>
      <button class="nav-item" data-view="waveplan">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Wave Plan</span>
      </button>
      <button class="nav-item" data-view="finance">
        <span class="nav-icon">◎</span>
        <span class="nav-label">Finance</span>
      </button>
      <button class="nav-item" data-view="analytics">
        <span class="nav-icon">⬡</span>
        <span class="nav-label">Analytics</span>
      </button>
    </nav>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="import-modal-title">Import File</h2>
        <button class="icon-btn" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="import-modal-body">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="js/utils/storage.js"></script>
  <script src="js/utils/parser.js"></script>
  <script src="js/utils/charts.js"></script>
  <script src="js/modules/home.js"></script>
  <script src="js/modules/metrics.js"></script>
  <script src="js/modules/waveplan.js"></script>
  <script src="js/modules/finance.js"></script>
  <script src="js/modules/analytics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
